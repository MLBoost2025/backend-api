services:
  - type: web
    name: katalume-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /ready
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: EXECUTION_MODE
        value: disabled
      - key: TRUST_PROXY
        value: "1"
      - key: MONGO_POOL_SIZE
        value: "5"
      - key: ALLOW_BEARER_AUTH
        value: "false"
      - key: COOKIE_DOMAIN
        value: ""
      - key: COOKIE_SAME_SITE
        value: lax
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: OAUTH_CALLBACK_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
