name: katalume-production

services:
  api:
    build:
      context: ../..
    env_file:
      - ${KATALUME_ENV_FILE:-api.env}
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=384
    expose:
      - "5001"
    init: true
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 640m
    networks:
      - edge
      - backend

  worker:
    build:
      context: ../..
    command: ["npm", "run", "worker"]
    env_file:
      - ${KATALUME_ENV_FILE:-api.env}
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=384
    init: true
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 640m
    networks:
      - backend

  caddy:
    image: caddy:2.10.2-alpine
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.katalume.com}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

networks:
  edge:
  backend:
    internal: true

volumes:
  caddy_data:
  caddy_config:
