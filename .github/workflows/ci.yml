name: Backend CI

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Node.js v24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build production container
        run: docker build --tag katalume-backend:${{ github.sha }} .

      - name: Validate production Compose manifests
        run: |
          KATALUME_ENV_FILE=api.env.example docker compose \
            --env-file deploy/production/api.env.example \
            -f deploy/production/docker-compose.yml config --quiet
          docker compose \
            --env-file judge0/judge0-v1.13.1/judge0.conf \
            -f judge0/judge0-v1.13.1/docker-compose.yml config --quiet
